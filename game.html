<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container game-container">
    <div class="game-header">
      <a href="index.html" class="back-btn">&larr; Back</a>
      <h1 id="theme-title"></h1>
      <div class="timer" id="timer">00:00</div>
    </div>

    <div id="matched-names" class="matched-names"></div>

    <div id="game-board" class="game-board"></div>

    <div id="game-over" class="game-over hidden">
      <h2>Congratulations!</h2>
      <p id="final-time"></p>
      <p id="penalty-info"></p>
      <button class="btn" onclick="window.location.href='index.html'">Play Again</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
